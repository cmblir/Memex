name: release

# Build the Tauri desktop app on real macOS + Windows runners and publish the
# installers to a GitHub Release. Triggered by pushing a version tag (e.g.
# v0.1.0). macOS produces a universal .dmg (Apple Silicon + Intel); Windows
# produces an NSIS .exe — the two bundle targets declared in tauri.conf.json.
on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write # tauri-action creates the release + uploads assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # universal dmg for Apple Silicon + Intel
            args: "--target universal-apple-darwin"
          - platform: "windows-latest" # NSIS .exe installer
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The bundled SEED model (models/*.gguf, ~412 MB) is stored in Git
          # LFS. Without this the runner checks out only the ~130-byte LFS
          # pointer, and tauri bundles THAT — producing a ~10 MB installer whose
          # offline model is a text stub. Pull the real object so the shipped
          # app's builtin model actually works.
          lfs: true

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both mac targets are only needed for the universal build, so gate
          # them on the macOS runner to keep the Windows job lean.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm ci
        working-directory: app

      # Pinned to an exact release of tauri-action (no moving v0/v1 tag exists).
      - uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The bundled SEED model (llama-cpp-sys-2 → ggml) compiles C++17
          # std::filesystem, which is "unavailable before macOS 10.15". Tauri's
          # default deployment target (10.13) made the universal-darwin build
          # fail to compile. Pin 10.15 so the C++ has std::filesystem; matches
          # bundle.macOS.minimumSystemVersion. No-op on the Windows runner.
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          # Code signing is OFF for v0.1 (unsigned .dmg / .exe — see the release
          # body + README Gatekeeper/SmartScreen note). The APPLE_* signing env
          # vars are deliberately NOT passed: an unset secret resolves to an
          # EMPTY string, and tauri-action treats a present-but-empty
          # APPLE_CERTIFICATE as "sign" and runs `security import` with no data,
          # which fails the whole macOS bundle. To enable signing later, add the
          # secrets and restore the APPLE_* / AZURE_* env block per docs/SIGNING.md.
        with:
          projectPath: app # the Tauri app lives in app/, not the repo root
          tagName: ${{ github.ref_name }}
          releaseName: "Memex ${{ github.ref_name }}"
          releaseBody: >
            Memex — a cross-platform desktop wiki for plain markdown vaults.

            Download the installer for your OS below.
            macOS: universal .dmg (Apple Silicon + Intel).
            Windows: NSIS .exe installer.
            Both are unsigned for v0.1 — on first launch macOS Gatekeeper and
            Windows SmartScreen will warn; see the README for how to allow it.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
