<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memex — neural mesh</title>
    <style>
      /* GraphScene reads --bg / --ink off :root to pick the dark theme. */
      :root {
        --bg: #0a0b0f;
        --ink: #e6e8eb;
      }
      html,
      body,
      #app {
        margin: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      body {
        /* deep space with a faint cool core glow */
        background:
          radial-gradient(circle at 50% 45%, rgba(60, 70, 110, 0.12) 0%, rgba(8, 9, 14, 0) 42%),
          #06070c;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/heroMesh.ts"></script>
  </body>
</html>
